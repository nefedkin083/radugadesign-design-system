version: 0.2
status: extracted from Figma 'Цветовая палитра' (node 1098:1876)
source: figma rd4-C, page guideline (1:6)

# У Radugadesign нет одного фирменного цвета.
# Есть палитра-инструмент: 13 hue-колонок × 6 tone-рядов = 78 цветов.
# Применяется в 3D-графике, иллюстрациях, мерче — везде, где нужен цвет.

structure:
  hue_columns: 13
  tone_rows: 6
  total: 78

# tones[0] — самые светлые/насыщенные («brand bright»)
# tones[5] — самые тёмные («charcoal»)
tone_names: [bright, vivid, deep, rich, dark, charcoal]

# 13 hue-колонок, идут слева направо как в Figma-сетке.
# Каждая колонка — список из 6 тонов: bright → charcoal.
hues:
  cyan:    ["#1DEEEB", "#1AD4D1", "#17B9B7", "#139F9D", "#0D6A68", "#0A4F4E"]
  sky:     ["#14D8FF", "#12C0E3", "#10A8C6", "#0D90AA", "#096071", "#074855"]
  blue:    ["#29A6FE", "#2494E2", "#2081C6", "#1B6FA9", "#124A71", "#0E3755"]
  indigo:  ["#4D73F3", "#4466D8", "#3C59BD", "#334DA2", "#22336C", "#1A2651"]
  purple:  ["#9756E5", "#864CCC", "#7543B2", "#653999", "#432666", "#321D4C"]
  magenta: ["#DA5BBE", "#C251A9", "#AA4794", "#913D7F", "#612854", "#491E3F"]
  pink:    ["#EF64A7", "#D45994", "#BA4E82", "#9F436F", "#6A2C4A", "#502138"]
  red:     ["#FE4D70", "#E24464", "#C63C57", "#A9334B", "#712232", "#551A25"]
  coral:   ["#FF6259", "#E3574F", "#C64C45", "#AA413B", "#712C28", "#55211E"]
  orange:  ["#FF8C26", "#E37C22", "#C66D1E", "#AA5D19", "#713E11", "#552F0D"]
  yellow:  ["#FFD900", "#E3C100", "#C6A900", "#AA9100", "#716000", "#554800"]
  lime:    ["#B0C63A", "#9CB034", "#899A2D", "#758427", "#4E581A", "#3B4213"]
  green:   ["#84BD5D", "#75A853", "#679348", "#587E3E", "#3B5429", "#2C3F1F"]

# Базовые ink/paper для типографики и поверхностей вне палитры
neutrals:
  ink: "#000000"
  paper: "#FFFFFF"
