version: 0.1
status: draft

source:
  origin: figma rd4-C
  primary_in_use: Pragmatica Next VF
  fallback_in_use: Inter
  notes: |
    9100 TEXT-нод. Pragmatica Next VF — 52% (4701).
    Inter — 23% (2087). Остальные — Helios, Montserrat, Iosevka,
    Pragmatica, GPN_DIN — точечно по проектам.

candidates:
  - name: Geologica
    family: "Geologica"
    license: OFL
    google_fonts: true
    variable: true
    axes: [wght, slnt, CRSV, SHRP]
    rationale: Самый нейтральный grotesque на GF. Близко к Pragmatica Next по характеру.
  - name: Onest
    family: "Onest"
    license: OFL
    google_fonts: true
    variable: true
    axes: [wght]
    rationale: Острее и продуктовее. Сильная кириллица.
  - name: Inter
    family: "Inter"
    license: OFL
    google_fonts: true
    variable: true
    axes: [opsz, wght]
    rationale: Самый универсальный safe-выбор. Уже встречается в файле.
  - name: Manrope
    family: "Manrope"
    license: OFL
    google_fonts: true
    variable: true
    axes: [wght]
    rationale: Geometric sans с тёплым «техно» характером. Для акцентов.

decision:
  primary: Manrope
  secondary: Inter
  decided_at: 2026-05-05
  decided_by: NIO
  notes: |
    Стартовали с Geologica 2026-05-04. На следующий день
    переключились на Manrope — geometric sans с более выраженным
    «техно» характером, лучше попадает в визуальный код студии.

usage:
  primary:
    family: Manrope
    weights: [200, 300, 400, 500, 600, 700, 800]
    google_slides: |
      В Google Slides: Insert → Font → More fonts → ищем "Manrope" → Add.
      Выставляем как Theme font для всего шаблона.
    web: |
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
      font-family: 'Manrope', sans-serif;
    self_host: ofl/manrope на github.com/google/fonts
  secondary:
    family: Inter
    use_for: Body-текст в плотных интерфейсах, мелкие подписи, табличные данные.
    google_slides: |
      Google Slides: Insert → Font → More fonts → "Inter".
    web: |
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
      font-family: 'Inter', sans-serif;
